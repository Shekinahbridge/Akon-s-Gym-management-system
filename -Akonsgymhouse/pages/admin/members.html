<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Members - Admin - Akon's GymHouse</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/styles.css">
</head>
<body>
    <div class="dashboard">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="../../index.html" class="sidebar-logo">AKON'S <span>GYMHOUSE</span></a>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="dashboard.html">📊 Dashboard</a></li>
                    <li><a href="members.html" class="active">👥 Members</a></li>
                    <li><a href="trainers.html">💪 Trainers</a></li>
                    <li><a href="classes.html">📅 Classes</a></li>
                    <li><a href="payments.html">💳 Payments</a></li>
                    <li><a href="reports.html">📈 Reports</a></li>
                    <li><a href="settings.html">⚙️ Settings</a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar" id="userAvatar">A</div>
                    <div class="user-details">
                        <div class="user-name" id="userName">Admin</div>
                        <div class="user-role">Administrator</div>
                    </div>
                </div>
                <button onclick="Auth.logout()" class="btn btn-outline btn-sm" style="width: 100%; margin-top: 1rem;">Logout</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <div>
                    <h1>Members</h1>
                    <p style="color: var(--text-secondary);">Manage all gym members</p>
                </div>
                <div style="display: flex; gap: 1rem;">
                    <button onclick="exportMembersCSV()" class="btn btn-outline">📥 Export CSV</button>
                    <button onclick="showAddMemberModal()" class="btn btn-primary">+ Add Member</button>
                </div>
            </div>

            <!-- Search & Filter -->
            <div class="card" style="margin-bottom: 2rem;">
                <div style="display: grid; grid-template-columns: 2fr 1fr 1fr auto; gap: 1rem; align-items: end;">
                    <div class="form-group" style="margin: 0;">
                        <label class="form-label">Search</label>
                        <input type="text" id="searchInput" class="form-input" placeholder="Search by name or email...">
                    </div>
                    <div class="form-group" style="margin: 0;">
                        <label class="form-label">Plan</label>
                        <select id="filterPlan" class="form-select">
                            <option value="">All Plans</option>
                            <option value="basic">Basic</option>
                            <option value="standard">Standard</option>
                            <option value="premium">Premium</option>
                            <option value="none">No Plan</option>
                        </select>
                    </div>
                    <div class="form-group" style="margin: 0;">
                        <label class="form-label">Status</label>
                        <select id="filterStatus" class="form-select">
                            <option value="">All Status</option>
                            <option value="active">Active</option>
                            <option value="inactive">Inactive</option>
                        </select>
                    </div>
                    <button onclick="applyFilters()" class="btn btn-primary">Filter</button>
                </div>
            </div>

            <!-- Members Table -->
            <div class="table-container">
                <div class="table-header">
                    <h3>All Members</h3>
                    <span id="memberCount" style="color: var(--text-secondary);">0 members</span>
                </div>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Plan</th>
                            <th>Status</th>
                            <th>Joined</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="membersTable">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Add Member Modal -->
    <div class="modal-overlay" id="addMemberModal">
        <div class="modal">
            <div class="modal-header">
                <h3>Add New Member</h3>
                <button class="modal-close" onclick="UI.hideModal('addMemberModal')">&times;</button>
            </div>
            <div class="modal-body">
                <form id="addMemberForm">
                    <div class="form-group">
                        <label class="form-label">Full Name</label>
                        <input type="text" id="newMemberName" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" id="newMemberEmail" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Phone</label>
                        <input type="tel" id="newMemberPhone" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Membership Plan</label>
                        <select id="newMemberPlan" class="form-select" required>
                            <option value="">Select Plan</option>
                            <option value="basic">Basic - KES 2,500/week</option>
                            <option value="standard">Standard - KES 4,000/week</option>
                            <option value="premium">Premium - KES 6,500/week</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" id="newMemberPassword" class="form-input" required>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button onclick="UI.hideModal('addMemberModal')" class="btn btn-secondary">Cancel</button>
                <button onclick="addMember()" class="btn btn-primary">Add Member</button>
            </div>
        </div>
    </div>

    <!-- Edit Member Modal -->
    <div class="modal-overlay" id="editMemberModal">
        <div class="modal">
            <div class="modal-header">
                <h3>Edit Member</h3>
                <button class="modal-close" onclick="UI.hideModal('editMemberModal')">&times;</button>
            </div>
            <div class="modal-body">
                <form id="editMemberForm">
                    <input type="hidden" id="editMemberId">
                    <div class="form-group">
                        <label class="form-label">Full Name</label>
                        <input type="text" id="editMemberName" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" id="editMemberEmail" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Phone</label>
                        <input type="tel" id="editMemberPhone" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Membership Plan</label>
                        <select id="editMemberPlan" class="form-select">
                            <option value="">No Plan</option>
                            <option value="basic">Basic - KES 2,500/week</option>
                            <option value="standard">Standard - KES 4,000/week</option>
                            <option value="premium">Premium - KES 6,500/week</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Plan Expiry</label>
                        <input type="date" id="editMemberExpiry" class="form-input">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button onclick="deleteMember()" class="btn btn-danger">Delete</button>
                <button onclick="UI.hideModal('editMemberModal')" class="btn btn-secondary">Cancel</button>
                <button onclick="saveMember()" class="btn btn-primary">Save Changes</button>
            </div>
        </div>
    </div>

    <!-- View Member Modal -->
    <div class="modal-overlay" id="viewMemberModal">
        <div class="modal" style="max-width: 700px;">
            <div class="modal-header">
                <h3>Member Details</h3>
                <button class="modal-close" onclick="UI.hideModal('viewMemberModal')">&times;</button>
            </div>
            <div class="modal-body">
                <div id="memberDetails">
                    <!-- Populated by JS -->
                </div>
            </div>
            <div class="modal-footer">
                <button onclick="UI.hideModal('viewMemberModal')" class="btn btn-secondary">Close</button>
                <button onclick="printMemberDetails()" class="btn btn-outline">Print</button>
            </div>
        </div>
    </div>

    <script src="../../js/app.js"></script>
    <script>
        if (!Auth.requireRole('admin')) throw new Error('Unauthorized');

        const currentUser = Auth.getUser();
        document.getElementById('userName').textContent = currentUser.name;
        document.getElementById('userAvatar').textContent = currentUser.name.charAt(0).toUpperCase();

        let allMembers = [];
        let currentEditId = null;

        function loadMembers() {
            allMembers = DataStore.getUsers().filter(u => u.role === 'member');
            renderMembers(allMembers);
        }

        function renderMembers(members) {
            document.getElementById('memberCount').textContent = members.length + ' member' + (members.length !== 1 ? 's' : '');
            
            document.getElementById('membersTable').innerHTML = members.map(m => {
                const plan = DataStore.getPlanById(m.plan);
                const isActive = m.plan && new Date(m.planExpiry) > new Date();
                
                return `
                    <tr>
                        <td><strong>${m.name}</strong></td>
                        <td>${m.email}</td>
                        <td>${m.phone}</td>
                        <td>${plan ? plan.name : '-'}</td>
                        <td><span class="status-badge ${isActive ? 'active' : 'inactive'}">${isActive ? 'Active' : 'Inactive'}</span></td>
                        <td>${UI.formatDate(m.createdAt)}</td>
                        <td>
                            <button onclick="viewMember('${m.id}')" class="btn btn-sm btn-outline">View</button>
                            <button onclick="editMember('${m.id}')" class="btn btn-sm btn-outline">Edit</button>
                        </td>
                    </tr>
                `;
            }).join('') || '<tr><td colspan="7" style="text-align: center; padding: 2rem;">No members found</td></tr>';
        }

        function applyFilters() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const planFilter = document.getElementById('filterPlan').value;
            const statusFilter = document.getElementById('filterStatus').value;

            let filtered = allMembers;

            if (search) {
                filtered = filtered.filter(m => 
                    m.name.toLowerCase().includes(search) || 
                    m.email.toLowerCase().includes(search)
                );
            }

            if (planFilter) {
                if (planFilter === 'none') {
                    filtered = filtered.filter(m => !m.plan);
                } else {
                    filtered = filtered.filter(m => m.plan === planFilter);
                }
            }

            if (statusFilter) {
                const isActive = statusFilter === 'active';
                filtered = filtered.filter(m => {
                    const active = m.plan && new Date(m.planExpiry) > new Date();
                    return active === isActive;
                });
            }

            renderMembers(filtered);
        }

        function showAddMemberModal() {
            UI.showModal('addMemberModal');
        }

        function addMember() {
            const name = document.getElementById('newMemberName').value;
            const email = document.getElementById('newMemberEmail').value;
            const phone = document.getElementById('newMemberPhone').value;
            const plan = document.getElementById('newMemberPlan').value;
            const password = document.getElementById('newMemberPassword').value;

            if (!name || !email || !phone || !plan || !password) {
                UI.toast('Please fill all fields', 'error');
                return;
            }

            if (DataStore.getUserByEmail(email)) {
                UI.toast('Email already registered', 'error');
                return;
            }

            const planData = DataStore.getPlanById(plan);
            const user = DataStore.addUser({
                name,
                email,
                phone,
                password,
                role: 'member',
                plan,
                planExpiry: new Date(Date.now() + 7 * 24 * 60 * 60 * 1000).toISOString()
            });

            DataStore.addPayment({
                userId: user.id,
                planId: plan,
                amount: planData.price,
                transactionId: 'CASH' + Date.now(),
                phone: phone,
                status: 'completed'
            });

            UI.toast('Member added successfully!', 'success');
            UI.hideModal('addMemberModal');
            document.getElementById('addMemberForm').reset();
            loadMembers();
        }

        function viewMember(id) {
            const member = DataStore.getUserById(id);
            if (!member) return;

            const plan = DataStore.getPlanById(member.plan);
            const payments = DataStore.getPaymentsByUser(id);
            const checkins = DataStore.getCheckinsByUser(id);
            const bookings = DataStore.getBookingsByUser(id);

            document.getElementById('memberDetails').innerHTML = `
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
                    <div>
                        <h4 style="color: var(--accent); margin-bottom: 1rem;">Personal Information</h4>
                        <p><strong>Name:</strong> ${member.name}</p>
                        <p><strong>Email:</strong> ${member.email}</p>
                        <p><strong>Phone:</strong> ${member.phone}</p>
                        <p><strong>Joined:</strong> ${UI.formatDate(member.createdAt)}</p>
                    </div>
                    <div>
                        <h4 style="color: var(--accent); margin-bottom: 1rem;">Membership</h4>
                        <p><strong>Plan:</strong> ${plan ? plan.name : 'None'}</p>
                        <p><strong>Status:</strong> ${member.plan && new Date(member.planExpiry) > new Date() ? 'Active' : 'Inactive'}</p>
                        <p><strong>Expiry:</strong> ${member.planExpiry ? UI.formatDate(member.planExpiry) : '-'}</p>
                        <p><strong>Total Payments:</strong> KES ${payments.reduce((s, p) => s + p.amount, 0).toLocaleString()}</p>
                    </div>
                </div>
                <div style="margin-top: 2rem;">
                    <h4 style="color: var(--accent); margin-bottom: 1rem;">Activity Summary</h4>
                    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem;">
                        <div class="card text-center">
                            <div style="font-size: 2rem; font-weight: 700; color: var(--accent);">${checkins.length}</div>
                            <p style="font-size: 0.875rem;">Total Check-ins</p>
                        </div>
                        <div class="card text-center">
                            <div style="font-size: 2rem; font-weight: 700; color: var(--accent);">${payments.length}</div>
                            <p style="font-size: 0.875rem;">Payments Made</p>
                        </div>
                        <div class="card text-center">
                            <div style="font-size: 2rem; font-weight: 700; color: var(--accent);">${bookings.length}</div>
                            <p style="font-size: 0.875rem;">Class Bookings</p>
                        </div>
                    </div>
                </div>
                ${payments.length > 0 ? `
                    <div style="margin-top: 2rem;">
                        <h4 style="color: var(--accent); margin-bottom: 1rem;">Recent Payments</h4>
                        <table class="data-table">
                            <thead>
                                <tr><th>Date</th><th>Amount</th><th>Transaction ID</th></tr>
                            </thead>
                            <tbody>
                                ${payments.slice(-5).reverse().map(p => `
                                    <tr>
                                        <td>${UI.formatDate(p.createdAt)}</td>
                                        <td>KES ${p.amount.toLocaleString()}</td>
                                        <td><code>${p.transactionId}</code></td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                ` : ''}
            `;

            UI.showModal('viewMemberModal');
        }

        function editMember(id) {
            const member = DataStore.getUserById(id);
            if (!member) return;

            currentEditId = id;
            document.getElementById('editMemberId').value = id;
            document.getElementById('editMemberName').value = member.name;
            document.getElementById('editMemberEmail').value = member.email;
            document.getElementById('editMemberPhone').value = member.phone;
            document.getElementById('editMemberPlan').value = member.plan || '';
            document.getElementById('editMemberExpiry').value = member.planExpiry ? member.planExpiry.split('T')[0] : '';

            UI.showModal('editMemberModal');
        }

        function saveMember() {
            const updates = {
                name: document.getElementById('editMemberName').value,
                email: document.getElementById('editMemberEmail').value,
                phone: document.getElementById('editMemberPhone').value,
                plan: document.getElementById('editMemberPlan').value || null,
                planExpiry: document.getElementById('editMemberExpiry').value || null
            };

            DataStore.updateUser(currentEditId, updates);
            UI.toast('Member updated successfully!', 'success');
            UI.hideModal('editMemberModal');
            loadMembers();
        }

        function deleteMember() {
            if (confirm('Are you sure you want to delete this member? This action cannot be undone.')) {
                DataStore.deleteUser(currentEditId);
                UI.toast('Member deleted', 'success');
                UI.hideModal('editMemberModal');
                loadMembers();
            }
        }

        function exportMembersCSV() {
            const members = DataStore.getUsers().filter(u => u.role === 'member');
            const data = members.map(m => ({
                Name: m.name,
                Email: m.email,
                Phone: m.phone,
                Plan: m.plan || 'None',
                Status: m.plan && new Date(m.planExpiry) > new Date() ? 'Active' : 'Inactive',
                Joined: UI.formatDate(m.createdAt)
            }));
            
            Reports.downloadCSV(data, 'members_report_' + new Date().toISOString().split('T')[0]);
            UI.toast('Members exported successfully!', 'success');
        }

        function printMemberDetails() {
            window.print();
        }

        // Search on input
        document.getElementById('searchInput').addEventListener('input', applyFilters);

        // Load on page load
        loadMembers();

        // Check for edit param
        const urlParams = new URLSearchParams(window.location.search);
        const editId = urlParams.get('edit');
        if (editId) {
            editMember(editId);
        }
    </script>
</body>
</html>
