<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Akon's GymHouse</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Welcome Back</h1>
                <p>Sign in to your Akon's GymHouse account</p>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" id="email" class="form-input" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
                </div>
                <div class="form-group" style="display: flex; justify-content: space-between; align-items: center;">
                    <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                        <input type="checkbox" id="remember"> Remember me
                    </label>
                    <a href="#" style="color: var(--accent); font-size: 0.875rem;">Forgot password?</a>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
            </form>
            <div class="auth-footer">
                <p>Don't have an account? <a href="register.html">Join Now</a></p>
            </div>
            <div style="margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--wheat);">
                <p style="font-size: 0.8rem; color: var(--text-secondary); text-align: center; margin-bottom: 0.5rem;">Quick Login (Click to auto-fill):</p>
                <div style="display: grid; gap: 0.5rem;">
                    <button type="button" onclick="quickLogin('admin@akonsgym.com', 'admin123')" class="btn btn-outline btn-sm" style="justify-content: space-between; display: flex;">
                        <span>👤 Admin</span>
                        <span style="font-size: 0.7rem; color: var(--text-secondary);">admin@akonsgym.com</span>
                    </button>
                    <button type="button" onclick="quickLogin('mike@akonsgym.com', 'trainer123')" class="btn btn-outline btn-sm" style="justify-content: space-between; display: flex;">
                        <span>💪 Trainer</span>
                        <span style="font-size: 0.7rem; color: var(--text-secondary);">mike@akonsgym.com</span>
                    </button>
                </div>
                <button type="button" onclick="resetData()" style="margin-top: 1rem; width: 100%; background: none; border: none; color: var(--text-secondary); font-size: 0.75rem; cursor: pointer; text-decoration: underline;">🔄 Reset All Data (if login fails)</button>
            </div>
            
            <script>
                function resetData() {
                    if(confirm('This will reset all data to defaults. Continue?')) {
                        localStorage.clear();
                        DataStore.init();
                        UI.toast('Data reset! Please try logging in again.', 'success');
                    }
                }
            </script>
        </div>
    </div>

    <script src="../js/app.js"></script>
    <script>
        // Check if localStorage is available
        try {
            localStorage.setItem('test', 'test');
            localStorage.removeItem('test');
        } catch (e) {
            alert('Your browser has localStorage disabled. Please enable it to use this app.');
        }
        
        // Debug: Log available users
        console.log('Available users:', DataStore.getUsers());
        console.log('localStorage users:', localStorage.getItem('gymhouse_users'));
        
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            doLogin();
        });
        
        // Quick login buttons for demo
        function quickLogin(email, password) {
            document.getElementById('email').value = email;
            document.getElementById('password').value = password;
            doLogin();
        }
        
        // Main login function
        function doLogin() {
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            
            console.log('Attempting login with:', email);
            
            // Ensure data is initialized
            DataStore.init();
            
            const result = Auth.login(email, password);
            
            if (result.success) {
                UI.toast('Welcome back, ' + result.user.name + '!', 'success');
                
                // Redirect based on role
                setTimeout(() => {
                    if (result.user.role === 'admin') {
                        window.location.href = 'admin/dashboard.html';
                    } else if (result.user.role === 'trainer') {
                        window.location.href = 'trainer/dashboard.html';
                    } else {
                        window.location.href = 'member/dashboard.html';
                    }
                }, 1000);
            } else {
                UI.toast(result.error, 'error');
            }
        }
    </script>
</body>
</html>
