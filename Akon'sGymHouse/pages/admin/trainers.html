<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trainers - Admin - Akon's GymHouse</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/styles.css">
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="../../index.html" class="sidebar-logo">AKON'S <span>GYMHOUSE</span></a>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="dashboard.html">📊 Dashboard</a></li>
                    <li><a href="members.html">👥 Members</a></li>
                    <li><a href="trainers.html" class="active">💪 Trainers</a></li>
                    <li><a href="classes.html">📅 Classes</a></li>
                    <li><a href="payments.html">💳 Payments</a></li>
                    <li><a href="reports.html">📈 Reports</a></li>
                    <li><a href="settings.html">⚙️ Settings</a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar" id="userAvatar">A</div>
                    <div class="user-details">
                        <div class="user-name" id="userName">Admin</div>
                        <div class="user-role">Administrator</div>
                    </div>
                </div>
                <button onclick="Auth.logout()" class="btn btn-outline btn-sm" style="width: 100%; margin-top: 1rem;">Logout</button>
            </div>
        </aside>

        <main class="main-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <div>
                    <h1>Trainers</h1>
                    <p style="color: var(--text-secondary);">Manage gym trainers</p>
                </div>
                <button onclick="showAddTrainerModal()" class="btn btn-primary">+ Add Trainer</button>
            </div>

            <div id="trainersGrid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem;">
                <!-- Populated by JS -->
            </div>
        </main>
    </div>

    <!-- Add Trainer Modal -->
    <div class="modal-overlay hidden" id="addTrainerModal">
        <div class="modal">
            <div class="modal-header">
                <h3>Add New Trainer</h3>
                <button class="modal-close" onclick="UI.hideModal('addTrainerModal')">&times;</button>
            </div>
            <div class="modal-body">
                <form id="addTrainerForm">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="form-group">
                            <label class="form-label">First Name</label>
                            <input type="text" id="trainerFirstName" class="form-input" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Last Name</label>
                            <input type="text" id="trainerLastName" class="form-input" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" id="trainerEmail" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Phone</label>
                        <input type="tel" id="trainerPhone" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Specialty</label>
                        <input type="text" id="trainerSpecialty" class="form-input" placeholder="e.g., Yoga & Mobility">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" id="trainerPassword" class="form-input" required>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button onclick="UI.hideModal('addTrainerModal')" class="btn btn-secondary">Cancel</button>
                <button onclick="addTrainer()" class="btn btn-primary">Add Trainer</button>
            </div>
        </div>
    </div>

    <!-- Edit Trainer Modal -->
    <div class="modal-overlay hidden" id="editTrainerModal">
        <div class="modal">
            <div class="modal-header">
                <h3>Edit Trainer</h3>
                <button class="modal-close" onclick="UI.hideModal('editTrainerModal')">&times;</button>
            </div>
            <div class="modal-body">
                <form id="editTrainerForm">
                    <input type="hidden" id="editTrainerId">
                    <div class="form-group">
                        <label class="form-label">Name</label>
                        <input type="text" id="editTrainerName" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" id="editTrainerEmail" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Phone</label>
                        <input type="tel" id="editTrainerPhone" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Specialty</label>
                        <input type="text" id="editTrainerSpecialty" class="form-input">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button onclick="deleteTrainer()" class="btn btn-danger">Delete</button>
                <button onclick="UI.hideModal('editTrainerModal')" class="btn btn-secondary">Cancel</button>
                <button onclick="saveTrainer()" class="btn btn-primary">Save Changes</button>
            </div>
        </div>
    </div>

    <script src="../../js/app.js"></script>
    <script>
        if (!Auth.requireRole('admin')) throw new Error('Unauthorized');

        const currentUser = Auth.getUser();
        document.getElementById('userName').textContent = currentUser.name;
        document.getElementById('userAvatar').textContent = currentUser.name.charAt(0).toUpperCase();

        let currentEditId = null;

        async function loadTrainers() {
            const trainers = await DataStore.getUsers('trainer');
            const classes = await DataStore.getClasses();
            const bookings = await DataStore.getBookings();
            
            document.getElementById('trainersGrid').innerHTML = trainers.map(t => {
                const trainerClasses = classes.filter(c => c.trainer_id === t.id);
                const classIds = trainerClasses.map(c => c.id);
                const trainerBookings = bookings.filter(b => classIds.includes(b.class_id));
                
                return `
                    <div class="card">
                        <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem;">
                            <div style="width: 60px; height: 60px; background-color: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.5rem; font-weight: 700;">
                                ${t.name.charAt(0).toUpperCase()}
                            </div>
                            <div>
                                <h3 style="margin: 0;">${t.name}</h3>
                                <p style="color: var(--text-secondary); font-size: 0.875rem; margin: 0;">${t.specialty || 'No specialty'}</p>
                            </div>
                        </div>
                        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin: 1rem 0; text-align: center;">
                            <div style="background-color: var(--cream); padding: 0.5rem; border-radius: 8px;">
                                <div style="font-size: 1.25rem; font-weight: 700; color: var(--accent);">${trainerClasses.length}</div>
                                <div style="font-size: 0.75rem; color: var(--text-secondary);">Classes</div>
                            </div>
                            <div style="background-color: var(--cream); padding: 0.5rem; border-radius: 8px;">
                                <div style="font-size: 1.25rem; font-weight: 700; color: var(--accent);">${trainerBookings.length}</div>
                                <div style="font-size: 0.75rem; color: var(--text-secondary);">Bookings</div>
                            </div>
                            <div style="background-color: var(--cream); padding: 0.5rem; border-radius: 8px;">
                                <div style="font-size: 1.25rem; font-weight: 700; color: var(--accent);">${[...new Set(trainerBookings.map(b => b.user_id))].length}</div>
                                <div style="font-size: 0.75rem; color: var(--text-secondary);">Members</div>
                            </div>
                        </div>
                        <p style="font-size: 0.875rem; color: var(--text-secondary); margin: 0.5rem 0;">
                            <strong>Email:</strong> ${t.email}<br>
                            <strong>Phone:</strong> ${t.phone}
                        </p>
                        <button onclick="editTrainer('${t.id}')" class="btn btn-outline" style="width: 100%; margin-top: 1rem;">Edit Trainer</button>
                    </div>
                `;
            }).join('') || '<p style="text-align: center; padding: 2rem;">No trainers yet</p>';
        }

        function showAddTrainerModal() {
            UI.showModal('addTrainerModal');
        }

        async function addTrainer() {
            const firstName = document.getElementById('trainerFirstName').value;
            const lastName = document.getElementById('trainerLastName').value;
            const email = document.getElementById('trainerEmail').value;
            const phone = document.getElementById('trainerPhone').value;
            const specialty = document.getElementById('trainerSpecialty').value;
            const password = document.getElementById('trainerPassword').value;

            if (!firstName || !lastName || !email || !phone || !password) {
                UI.toast('Please fill all required fields', 'error');
                return;
            }

            const existing = await DataStore.getUserByEmail(email);
            if (existing) {
                UI.toast('Email already registered', 'error');
                return;
            }

            await DataStore.addUser({
                name: firstName + ' ' + lastName,
                email,
                phone,
                password,
                role: 'trainer',
                specialty
            });

            UI.toast('Trainer added successfully!', 'success');
            UI.hideModal('addTrainerModal');
            document.getElementById('addTrainerForm').reset();
            loadTrainers();
        }

        function editTrainer(id) {
            const trainers = [];
            // We'll get trainers from the page context
            const trainerCards = document.querySelectorAll('#trainersGrid .card');
            
            // Fetch fresh data
            DataStore.getUserById(id).then(trainer => {
                if (!trainer) return;

                currentEditId = id;
                document.getElementById('editTrainerId').value = id;
                document.getElementById('editTrainerName').value = trainer.name;
                document.getElementById('editTrainerEmail').value = trainer.email;
                document.getElementById('editTrainerPhone').value = trainer.phone;
                document.getElementById('editTrainerSpecialty').value = trainer.specialty || '';

                UI.showModal('editTrainerModal');
            });
        }

        async function saveTrainer() {
            const updates = {
                name: document.getElementById('editTrainerName').value,
                email: document.getElementById('editTrainerEmail').value,
                phone: document.getElementById('editTrainerPhone').value,
                specialty: document.getElementById('editTrainerSpecialty').value
            };

            await DataStore.updateUser(currentEditId, updates);
            UI.toast('Trainer updated successfully!', 'success');
            UI.hideModal('editTrainerModal');
            loadTrainers();
        }

        async function deleteTrainer() {
            if (confirm('Are you sure you want to delete this trainer?')) {
                await DataStore.deleteUser(currentEditId);
                UI.toast('Trainer deleted', 'success');
                UI.hideModal('editTrainerModal');
                loadTrainers();
            }
        }

        loadTrainers();
    </script>
</body>
</html>
