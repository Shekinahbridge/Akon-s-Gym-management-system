<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Classes - Trainer - Akon's GymHouse</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/styles.css">
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="../../index.html" class="sidebar-logo">AKON'S <span>GYMHOUSE</span></a>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="dashboard.html">📊 Dashboard</a></li>
                    <li><a href="classes.html" class="active">📅 My Classes</a></li>
                    <li><a href="attendance.html">📍 Attendance</a></li>
                    <li><a href="schedule.html">🗓️ Schedule</a></li>
                    <li><a href="profile.html">👤 Profile</a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar" id="userAvatar">T</div>
                    <div class="user-details">
                        <div class="user-name" id="userName">Trainer</div>
                        <div class="user-role">Trainer</div>
                    </div>
                </div>
                <button onclick="Auth.logout()" class="btn btn-outline btn-sm" style="width: 100%; margin-top: 1rem;">Logout</button>
            </div>
        </aside>

        <main class="main-content">
            <div style="margin-bottom: 2rem;">
                <h1>My Classes</h1>
                <p style="color: var(--text-secondary);">Classes assigned to you</p>
            </div>

            <div id="classesList" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem;">
                <!-- Populated by JS -->
            </div>
        </main>
    </div>

    <script src="../../js/app.js"></script>
    <script>
        if (!Auth.requireRole('trainer')) throw new Error('Unauthorized');

        const currentUser = Auth.getUser();
        document.getElementById('userName').textContent = currentUser.name;
        document.getElementById('userAvatar').textContent = currentUser.name.charAt(0).toUpperCase();

        async function loadClasses() {
            const classes = await DataStore.getClassesByTrainer(currentUser.id);
            const bookings = await DataStore.getBookings();
            
            document.getElementById('classesList').innerHTML = classes.map(c => {
                const classBookings = bookings.filter(b => b.class_id === c.id);
                return `
                    <div class="card">
                        <h3 style="margin-bottom: 0.5rem;">${c.name}</h3>
                        <p style="color: var(--text-secondary); font-size: 0.875rem; margin-bottom: 1rem;">
                            ${c.days.join(', ')} at ${c.time}
                        </p>
                        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; text-align: center; margin-bottom: 1rem;">
                            <div style="background-color: var(--cream); padding: 0.5rem; border-radius: 8px;">
                                <div style="font-size: 1.25rem; font-weight: 700; color: var(--accent);">${c.duration}</div>
                                <div style="font-size: 0.75rem; color: var(--text-secondary);">Minutes</div>
                            </div>
                            <div style="background-color: var(--cream); padding: 0.5rem; border-radius: 8px;">
                                <div style="font-size: 1.25rem; font-weight: 700; color: var(--accent);">${c.maxCapacity}</div>
                                <div style="font-size: 0.75rem; color: var(--text-secondary);">Capacity</div>
                            </div>
                            <div style="background-color: var(--cream); padding: 0.5rem; border-radius: 8px;">
                                <div style="font-size: 1.25rem; font-weight: 700; color: var(--accent);">${classBookings.length}</div>
                                <div style="font-size: 0.75rem; color: var(--text-secondary);">Bookings</div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('') || '<p style="text-align: center; padding: 2rem;">No classes assigned to you yet</p>';
        }

        loadClasses();
    </script>
</body>
</html>
