<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule - Trainer - Akon's GymHouse</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/styles.css">
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="../../index.html" class="sidebar-logo">AKON'S <span>GYMHOUSE</span></a>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="dashboard.html">📊 Dashboard</a></li>
                    <li><a href="classes.html">📅 My Classes</a></li>
                    <li><a href="attendance.html">📍 Attendance</a></li>
                    <li><a href="schedule.html" class="active">🗓️ Schedule</a></li>
                    <li><a href="profile.html">👤 Profile</a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar" id="userAvatar">T</div>
                    <div class="user-details">
                        <div class="user-name" id="userName">Trainer</div>
                        <div class="user-role">Trainer</div>
                    </div>
                </div>
                <button onclick="Auth.logout()" class="btn btn-outline btn-sm" style="width: 100%; margin-top: 1rem;">Logout</button>
            </div>
        </aside>

        <main class="main-content">
            <div style="margin-bottom: 2rem;">
                <h1>My Schedule</h1>
                <p style="color: var(--text-secondary);">Your weekly class schedule</p>
            </div>

            <div class="card" style="overflow-x: auto;">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>Monday</th>
                            <th>Tuesday</th>
                            <th>Wednesday</th>
                            <th>Thursday</th>
                            <th>Friday</th>
                            <th>Saturday</th>
                            <th>Sunday</th>
                        </tr>
                    </thead>
                    <tbody id="scheduleTable">
                        <tr><td colspan="8" style="text-align: center; padding: 2rem;">Loading...</td></tr>
                    </tbody>
                </table>
            </div>

            <div class="card" style="margin-top: 2rem;">
                <h3 style="margin-bottom: 1.5rem;">Class Details</h3>
                <div id="classDetails" style="display: grid; gap: 1rem;">
                    <!-- Populated by JS -->
                </div>
            </div>
        </main>
    </div>

    <script src="../../js/app.js"></script>
    <script>
        if (!Auth.requireRole('trainer')) throw new Error('Unauthorized');

        const currentUser = Auth.getUser();
        document.getElementById('userName').textContent = currentUser.name;
        document.getElementById('userAvatar').textContent = currentUser.name.charAt(0).toUpperCase();

        async function loadSchedule() {
            const classes = await DataStore.getClassesByTrainer(currentUser.id);
            const timeSlots = [...new Set(classes.map(c => c.time))].sort();
            
            const dayMap = { 'Mon': 1, 'Tue': 2, 'Wed': 3, 'Thu': 4, 'Fri': 5, 'Sat': 6, 'Sun': 0 };
            
            document.getElementById('scheduleTable').innerHTML = timeSlots.map(time => `
                <tr>
                    <td><strong>${time}</strong></td>
                    ${[1, 2, 3, 4, 5, 6, 0].map(day => {
                        const cls = classes.find(c => c.time === time && c.days.some(d => dayMap[d] === day));
                        if (cls) {
                            return `<td style="background-color: var(--cream);">
                                <strong style="color: var(--accent);">${cls.name}</strong>
                                <p style="font-size: 0.75rem; color: var(--text-secondary); margin: 0;">${cls.duration} min</p>
                            </td>`;
                        }
                        return '<td>-</td>';
                    }).join('')}
                </tr>
            `).join('') || '<tr><td colspan="8" style="text-align: center; padding: 2rem;">No classes scheduled</td></tr>';

            document.getElementById('classDetails').innerHTML = classes.map(c => `
                <div style="display: flex; justify-content: space-between; align-items: center; padding: 1rem; background-color: var(--cream); border-radius: 12px;">
                    <div>
                        <h4 style="margin: 0;">${c.name}</h4>
                        <p style="font-size: 0.875rem; color: var(--text-secondary); margin: 0.25rem 0 0;">
                            ${c.days.join(', ')} • ${c.time} • ${c.duration} minutes
                        </p>
                    </div>
                    <div style="text-align: right;">
                        <div style="font-size: 1.25rem; font-weight: 700; color: var(--accent);">${c.maxCapacity}</div>
                        <div style="font-size: 0.75rem; color: var(--text-secondary);">Max Capacity</div>
                    </div>
                </div>
            `).join('') || '<p style="text-align: center;">No classes assigned</p>';
        }

        loadSchedule();
    </script>
</body>
</html>
